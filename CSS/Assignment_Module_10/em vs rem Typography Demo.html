<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>em vs rem Typography Demo</title>
    <style>
        .parent
        {
            font-size: 16px;
            background-color: rgb(105, 177, 240);
            display: grid;
            justify-content: center;
            height: 500px;
            margin: 200px;
            padding: 100px;
            font-size: 20px;            
         }
         .child
         {
            font-size: 2em;            
         }
         .child2
         {
            font-size:2rem;
         }
    </style>
</head>
<body>
    <div class="parent">
        <p>Fork Infosystems, Karad.</p>
        <p class="child">
            Welcome to the Programming World.
        </p>
        <p class="child2">
            Lets Start Our IT Career Here.
        </p>
    </div>
    
</body>
</html>
