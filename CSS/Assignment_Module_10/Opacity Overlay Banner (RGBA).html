<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opacity Overlay Banner</title>
    <style>
        .hero-section {
            background-image: url("https://plus.unsplash.com/premium_photo-1661961750274-cd35348ea4bc?q=80&w=913&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D");
            position: relative;
            background-size: cover;
            height: 100vh;
            background-position: center;
            display: flex;
            justify-content: center;
            flex-direction: column;
            text-align: center;
            color: #0d09f2;
            z-index: 1;
            opacity: 0.7;
        }

        .content {
           
            height: 500px;
            width: 500px;
            margin-left: 70vh;
            position: absolute;
            z-index: 2;
        }

        h1 {
            font-size: 100px;
            font-weight: bold;
        }

        p {
            font-size: 50px;
        }
    </style>
</head>

<body>
    <div class="hero-section">
        <div class="content">
            <h1>Fork Infosystems</h1>
            <p>Address: Vidyanagar, Tal.Karad, Dist.Satara</p>
        </div>
    </div>
</body>

</html>
