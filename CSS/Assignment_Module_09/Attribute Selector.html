<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attribute Selector</title>
    <style>
        input[type="text"] {
            border-color: rgb(5, 5, 5);
            background-color: rgb(212, 163, 233);
        }

        input[type="Password"] {
            background-color: rgb(212, 163, 233);
            border-color: rgb(8, 8, 8);
        }

        a[href^="/Attribute Selector .html"] {
            color: rgb(232, 16, 16);
            font-family: 'San serif', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            text-decoration-line: none;
        }
    </style>
</head>

<body>
    <form>
        <label for="Uname">Username : &nbsp;&nbsp;&nbsp;</label>
        <input type="text" name="Username"><br><br>
        <label for="Mname">Middlename :&nbsp;</label>
        <input type="text" name="Middle"><br><br>
        <label for="Sname">Surname : &nbsp;&nbsp;&nbsp;</label>
        <input type="text" name="Surname"><br><br>
        <label for="Pass">Password : &nbsp;&nbsp;</label>
        <input type="Password" name="Password"><br><hr>
        <a href="/Attribute Selector .html">Attribute</a>

    </form>
</body>

</html>
